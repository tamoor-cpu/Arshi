# Render Blueprint — deploys ARSHI as a single Docker web service.
# In Render: New → Blueprint → connect this repo → fill in the secret values.
services:
  - type: web
    name: arshi
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter            # always-on; the free tier spins down between requests
    healthCheckPath: /api/v1/health
    autoDeploy: true
    # Persistent disk for uploaded files (signed PDFs, photos) so they survive
    # restarts/redeploys without needing external object storage.
    disk:
      name: uploads
      mountPath: /app/server/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      # Secrets (sync:false → Render prompts you for the value, never stored in git):
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
